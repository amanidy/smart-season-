
<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/style.css" title="" type="" />
  <title>Login Page</title>
</head>

<body>
  <div id="login-page">
   
    <form id="user-info">
      <div class="heading">
      <h1>Login</h1
      >
      <p>Sign in to your account</p>
      </div>
      
    
      <div class="form-group">
        <label for="email">Email:</label>
      <input type="text" name="email" id="email" value="" placeholder="Enter your email" />
      </div>
      
      <div class="form-group">
         <label for="password">Password:</label>
      <input type="text" name="password" id="password" value="" placeholder="Enter your password" />
      </div>
      
       <button class="submit-btn" type="submit">Login</button>
    <div id="error-message">
      Invalid credentials!
    </div>
      
    </form>
    
   
  </div>
  <script src="../js/auth.js" type="module" charset="utf-8">
    
  </script>
</body>

</html>
